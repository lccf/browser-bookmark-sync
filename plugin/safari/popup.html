<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书签同步</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>书签同步</h1>
      <button id="configBtn" class="btn-icon" title="配置">⚙️</button>
    </header>

    <!-- 配置弹窗 -->
    <div id="configModal" class="modal hidden">
      <div class="modal-content">
        <h3>配置服务端地址</h3>
        <input type="text" id="serverUrl" placeholder="http://localhost:3000">
        <div class="modal-actions">
          <button id="saveConfig" class="btn-primary">保存</button>
          <button id="cancelConfig" class="btn-secondary">取消</button>
        </div>
      </div>
    </div>

    <!-- 操作按钮行：同步 + 导入导出 -->
    <div class="action-section">
      <div class="sync-dropdown">
        <button id="syncBtn" class="btn-primary">🔄 同步</button>
        <button id="syncModeBtn" class="btn-primary dropdown-toggle">▼</button>
        <div id="syncModeMenu" class="dropdown-menu hidden">
          <div class="dropdown-item active" data-mode="merge">
            <span class="check">✓</span> 合并同步
          </div>
          <div class="dropdown-item" data-mode="local">
            <span class="check">✓</span> 本地覆盖
          </div>
          <div class="dropdown-item" data-mode="server">
            <span class="check">✓</span> 服务端覆盖
          </div>
        </div>
      </div>
      <span id="syncStatus"></span>
      <button id="exportBtn" class="btn-secondary">📥 导出</button>
      <button id="importBtn" class="btn-secondary">📤 导入</button>
    </div>

    <!-- 导入弹窗 -->
    <div id="importModal" class="modal hidden">
      <div class="modal-content">
        <h3>导入书签</h3>
        
        <!-- 文件选择 -->
        <div class="file-select-section">
          <input type="file" id="importFile" accept=".json" class="hidden">
          <button id="selectFileBtn" class="btn-secondary">选择文件</button>
          <span id="selectedFileName" class="file-name">未选择文件</span>
        </div>
        
        <p class="modal-desc">选择导入方式：</p>
        <div class="import-options">
          <label class="radio-label">
            <input type="radio" name="importMode" value="merge" checked>
            <span>增量导入（合并到现有数据）</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="importMode" value="overwrite">
            <span>全量覆盖（替换现有数据）</span>
          </label>
        </div>
        <div class="modal-actions">
          <button id="confirmImport" class="btn-primary" disabled>确认导入</button>
          <button id="cancelImport" class="btn-secondary">取消</button>
        </div>
      </div>
    </div>

    <!-- 添加分组 -->
    <div class="add-group-section">
      <input type="text" id="newGroupName" placeholder="新分组名称">
      <button id="addGroupBtn" class="btn-secondary">+ 添加分组</button>
    </div>

    <!-- 书签列表 -->
    <div id="bookmarksList" class="bookmarks-list">
      <!-- 动态生成 -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
